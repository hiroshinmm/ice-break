name: Daily Tech Briefing Generator

on:
  push:
    branches: [ main ]
  schedule:
    # 毎日 日本時間(JST) 朝8:00 に実行 (UTCでは 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動実行用ボタン

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Allow pushing to the repository for Pages
    # Required permissions for GitHub Pages
    permissions:
      contents: write
      pages: write
      id-token: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      # Step 1: Fetch News
      - name: Fetch News
        run: node src/fetchNews.js
        
      # Step 2: Generate Insights via Gemini API
      - name: Generate Insights
        run: node src/generateInsights.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      # Step 3: Download Images & Generate Web Gallery
      - name: Process Images and Gallery
        run: node src/generateGallery.js

      # Step 4: Setup, Build and Deploy to GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Step 5: Send Email Notification
      - name: Send Notification
        run: node src/sendNotification.js
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          GITHUB_PAGES_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" 

      # Step 6: Commit and Push Archives
      - name: Commit and push archives
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/archives/
          git commit -m "chore: archive daily insights [skip ci]" || echo "No changes to commit"
          git push
